name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" build twine

      - name: Compile Python modules
        run: |
          python -m py_compile creatureos/cli.py creatureos/web.py creatureos/service.py creatureos/storage.py creatureos/config.py creatureos/codex_cli.py

      - name: Check frontend JavaScript
        run: |
          node --check creatureos/static/creature_os.js

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Build package artifacts
        run: |
          python -m build

      - name: Check package metadata
        run: |
          python -m twine check dist/*

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m venv /tmp/creatureos-wheel-smoke
          source /tmp/creatureos-wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          creatureos --help
